<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Responsive Pricing Cards</title>
    <link rel="stylesheet" href="pricing.css">
</head>
<body>

<h1>Responsive Pricing Cards</h1>

<div class="pricing-container">

    <div class="card">
        <h2>Basic</h2>
        <h1>₹0</h1>
        <p>✔ 1 User</p>
        <p>✔ 5GB Storage</p>
        <p>✔ Email Support</p>
        <button>Choose Plan</button>
    </div>

    <div class="card featured">
        <h2>Pro</h2>
        <h1>₹999</h1>
        <p>✔ 10 Users</p>
        <p>✔ 50GB Storage</p>
        <p>✔ Priority Support</p>
        <button>Choose Plan</button>
    </div>

    <div class="card">
        <h2>Team</h2>
        <h1>₹1999</h1>
        <p>✔ Unlimited Users</p>
        <p>✔ 200GB Storage</p>
        <p>✔ 24/7 Support</p>
        <button>Choose Plan</button>
    </div>

</div>

</body>
</html>
