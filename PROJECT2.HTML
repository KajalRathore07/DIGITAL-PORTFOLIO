<!DOCTYPE html>
<html>
<head>
    <title>GadgetMart</title>
    <link rel="stylesheet" href="style2.css">
</head>
<body>
    
       
    <h1>GadgetMart</h1>

    <!-- Product 1 -->
    <figure class="card">
        <img src="download.jpg"Wireless Headphones">
        <figcaption class="title">Wireless Headphones</figcaption>

        <p class="price">₹2,499</p>

        <ul>
            <li>Bluetooth 5.0</li>
            <li>Noise Cancellation</li>
            <li>20 Hours Battery</li>
        </ul>
        <button>Buy Now</button>
    </figure>

    <!-- Product 2 -->
    <figure class="card">
        <img src="download (1).jpg" alt="Smart Watch">
        <figcaption class="title">Smart Watch</figcaption>

        <p class="price">₹3,999</p>

        <ul>
            <li>Heart Rate Monitor</li>
            <li>Water Resistant</li>
            <li>7 Days Battery</li>
        </ul>
        <button>Buy NoW</button>
    </figure>
    

</body>
</html>
